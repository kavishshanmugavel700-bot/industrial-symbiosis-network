<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace - ISIN Taiwan</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo" id="nav-logo">
        <svg viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.75z"/>
        </svg>
        <span>ISIN Taiwan</span>
      </a>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="search.html">Search Materials</a></li>
        </ul>
      </nav>
      <div class="nav-auth">
        <!-- Loaded dynamically -->
      </div>
    </div>
  </header>

  <!-- Marketplace Main Section -->
  <main>
    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
      <div>
        <h1 class="section-title">Industrial Waste Marketplace</h1>
        <p class="section-subtitle" style="margin-bottom: 0;">Browse open surplus listings or offer materials for symbiosis exchange.</p>
      </div>
      <div id="create-listing-btn-container" style="display: none;">
        <button id="open-modal-btn" class="btn btn-primary" style="display: inline-flex; align-items: center; gap: 0.5rem;">
          <svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          Create Listing
        </button>
      </div>
    </div>

    <!-- Filters Bar Card -->
    <div class="card" style="padding: 1.5rem; margin-bottom: 2.5rem; background-color: var(--clr-surface);">
      <h3 style="font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; color: var(--clr-text-main);">Search & Filter</h3>
      <form id="filter-form" style="display: flex; gap: 1rem; align-items: flex-end; flex-wrap: wrap;">
        <div class="form-group" style="margin-bottom: 0; flex-grow: 1; min-width: 200px;">
          <label for="filter-material" style="font-size: 0.85rem;">Material Type</label>
          <input type="text" id="filter-material" class="form-control" placeholder="e.g. Silicon, Acid, Copper">
        </div>
        <div class="form-group" style="margin-bottom: 0; flex-grow: 1; min-width: 150px;">
          <label for="filter-quantity" style="font-size: 0.85rem;">Min Quantity (kg)</label>
          <input type="number" id="filter-quantity" class="form-control" placeholder="e.g. 500">
        </div>
        <div style="display: flex; gap: 0.75rem;">
          <button type="submit" class="btn btn-primary" style="padding: 0.75rem 1.5rem;">Apply Filters</button>
          <button type="button" id="reset-filters-btn" class="btn btn-secondary" style="padding: 0.75rem 1.5rem;">Reset</button>
        </div>
      </form>
    </div>

    <!-- Listings Container -->
    <div id="listings-grid" class="grid grid-cols-3">
      <!-- Loaded dynamically via js/marketplace.js -->
      <div style="grid-column: 1 / -1; text-align: center; padding: 4rem 2rem; color: var(--clr-text-muted);">
        <p style="font-size: 1.1rem; font-weight: 500;">Loading waste listings...</p>
      </div>
    </div>
  </main>

  <!-- Create Listing Dialog Modal -->
  <div id="create-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Create Waste Listing</h3>
        <button id="close-modal-btn" class="close-btn">&times;</button>
      </div>
      <form id="create-listing-form">
        <div class="form-group">
          <label for="materialType">Material Surplus Type</label>
          <input type="text" id="materialType" class="form-control" placeholder="e.g. Copper Slurry, Sulfuric Acid, Fly Ash" required>
        </div>
        <div class="form-group">
          <label for="quantityKg">Quantity (kg)</label>
          <input type="number" id="quantityKg" class="form-control" placeholder="e.g. 1500" required min="1">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="predictedSurplusDate">Surplus Date (Expected)</label>
            <input type="date" id="predictedSurplusDate" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="confidenceScore">Prediction Confidence</label>
            <input type="number" step="0.01" min="0" max="1" id="confidenceScore" class="form-control" value="0.95" required>
          </div>
        </div>
        <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem;">
          <button type="button" id="cancel-btn" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Publish Listing</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Industrial Symbiosis Intelligence Network (ISIN). All rights reserved.</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/marketplace.js"></script>
</body>
</html>
