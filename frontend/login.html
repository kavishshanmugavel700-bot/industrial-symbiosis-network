<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ISIN Taiwan</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column;">

  <!-- Navigation -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo" id="nav-logo">
        <svg viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.75z"/>
        </svg>
        <span>ISIN Taiwan</span>
      </a>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="search.html">Search Materials</a></li>
        </ul>
      </nav>
      <div class="nav-auth">
        <!-- Dyn -->
      </div>
    </div>
  </header>

  <!-- Login Form Section -->
  <main style="display: flex; align-items: center; justify-content: center; padding-top: 3rem; padding-bottom: 3rem;">
    <div class="card" style="max-width: 440px; width: 100%; box-shadow: var(--shadow-lg);">
      <div style="text-align: center; margin-bottom: 2rem;">
        <h2 style="font-size: 1.8rem; font-weight: 700; color: var(--clr-text-main);">Welcome Back</h2>
        <p style="font-size: 0.9rem; color: var(--clr-text-muted); margin-top: 0.2rem;">Sign in to access your industrial dashboard</p>
      </div>

      <!-- Inline error container -->
      <div id="error-box" style="display: none; background-color: #fef2f2; border: 1px solid #fee2e2; color: var(--clr-error); padding: 0.75rem 1rem; border-radius: var(--radius-md); font-size: 0.9rem; margin-bottom: 1.5rem; font-weight: 500;">
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Work Email</label>
          <input type="email" id="email" class="form-control" placeholder="name@company.com" required autocomplete="username">
        </div>
        <div class="form-group" style="margin-bottom: 1.5rem;">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%;">
          Sign In
        </button>
      </form>

      <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--clr-text-muted);">
        Don't have an account? <a href="register.html" style="color: var(--clr-primary); font-weight: 600; text-decoration: none;">Register here</a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Industrial Symbiosis Intelligence Network (ISIN). All rights reserved.</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/notifications.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // If already logged in, redirect away
      if (auth.isAuthenticated()) {
        const user = auth.getUser();
        if (user && user.role === 'admin') {
          window.location.href = 'gov-dashboard.html';
        } else {
          window.location.href = 'marketplace.html';
        }
      }

      const form = document.getElementById('login-form');
      const errorBox = document.getElementById('error-box');
      const submitBtn = document.getElementById('submit-btn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorBox.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in...';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
          const res = await apiFetch('/api/auth/login', {
            method: 'POST',
            body: JSON.stringify({ email, password })
          });

          // Save session keys
          auth.setSession(res.token, res.user, res.factory);
          notifications.showSuccess('Login successful!');

          // Dynamic route redirecting
          setTimeout(() => {
            const params = new URLSearchParams(window.location.search);
            const redirectUrl = params.get('redirect');
            if (redirectUrl) {
              window.location.href = decodeURIComponent(redirectUrl);
            } else if (res.user.role === 'admin') {
              window.location.href = 'gov-dashboard.html';
            } else {
              window.location.href = 'marketplace.html';
            }
          }, 1000);

        } catch (err) {
          errorBox.textContent = err.message || 'Login failed. Please check your credentials.';
          errorBox.style.display = 'block';
          notifications.showError(err.message || 'Login failed.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      });
    });
  </script>
</body>
</html>
